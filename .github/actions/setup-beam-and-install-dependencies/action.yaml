name: Setup BEAM, and Install Dependencies
description: Install BEAM, restore deps cache, and install dependencies

inputs:
  elixir-version:
    description: Elixir version to install
    required: false
    default: "> 0"
  otp-version:
    description: OTP version to install
    required: false
    default: "> 0"

outputs:
  elixir-version:
    description: Resolved Elixir version
    value: ${{ steps.setup-beam.outputs.elixir-version }}
  otp-version:
    description: Resolved OTP version
    value: ${{ steps.setup-beam.outputs.otp-version }}

runs:
  using: composite
  steps:
    - name: Setup BEAM
      uses: erlef/setup-beam@v1
      id: setup-beam
      with:
        elixir-version: ${{ inputs.elixir-version }}
        otp-version: ${{ inputs.otp-version }}

    - name: Restore dependencies cache
      uses: actions/cache@v5
      id: mix-cache
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ env.MIX_ENV || 'dev' }}-${{ steps.setup-beam.outputs.otp-version }}-${{ steps.setup-beam.outputs.elixir-version }}-${{ hashFiles('mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ env.MIX_ENV || 'dev' }}-${{ steps.setup-beam.outputs.otp-version }}-${{ steps.setup-beam.outputs.elixir-version }}-${{ hashFiles('mix.lock') }}
          ${{ runner.os }}-mix-${{ env.MIX_ENV || 'dev' }}-${{ steps.setup-beam.outputs.otp-version }}-${{ steps.setup-beam.outputs.elixir-version }}-
          ${{ runner.os }}-mix-${{ env.MIX_ENV || 'dev' }}-${{ steps.setup-beam.outputs.otp-version }}-
          ${{ runner.os }}-mix-${{ env.MIX_ENV || 'dev' }}
          ${{ runner.os }}-mix

    - name: Install Dependencies
      if: steps.mix-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mix local.rebar --force
        mix local.hex --force
        mix deps.get
        mix deps.compile
